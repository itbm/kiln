server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Same-origin proxy for Ollama cloud — ollama.com sends no CORS headers,
    # so the browser can't call it directly. The app defaults to /api/ollama.
    location /api/ollama/ {
        resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        set $ollama_upstream https://ollama.com;
        rewrite ^/api/ollama/(.*)$ /$1 break;
        proxy_pass $ollama_upstream;
        proxy_set_header Host ollama.com;
        proxy_ssl_server_name on;
        proxy_ssl_name ollama.com;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # streaming: hand chunks to the client immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 50m;
    }

    # Never cache the service worker or the app shell
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }

    # Hashed assets are immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
