name: Docker

on:
  push:
    branches: [main]
    # Publish only when the version is bumped — otherwise a merge without a
    # bump would overwrite the existing :<VERSION> image on GHCR.
    paths: [VERSION]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # github.repository_owner must be lowercase for ghcr — "itbm" already is
  IMAGE: ghcr.io/${{ github.repository_owner }}/kiln

jobs:
  # The optional agent runner: unit tests + image build check. Its image is
  # not published — compose builds it locally (see compose.yaml, profile
  # "agent").
  agentd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test kiln-agentd
        working-directory: agentd
        run: |
          npm install --no-audit --no-fund
          npm test
      - name: Build agentd image
        run: docker build ./agentd
      - name: Build sandbox template image
        run: docker build ./agentd/sandbox

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d ' \n' < VERSION)" >> "$GITHUB_OUTPUT"

      # arm64 is emulated — only needed when we actually publish
      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PRs: test that the image builds, never push.
      # main (VERSION bumped) or manual dispatch: build for amd64+arm64
      # and push :latest + :<VERSION>.
      - name: Build${{ github.event_name != 'pull_request' && ' and push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=Kiln
            org.opencontainers.image.description=Local-first mobile AI chat PWA
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
